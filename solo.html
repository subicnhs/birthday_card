<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Happy Birthday ❤️</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Lora:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet" />

<style>
  /* ─── Reset & Base ─────────────────────────────────────── */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:    #07071a;
    --purple:  #12083a;
    --rose:    #e91e8c;
    --gold:    #ffd166;
    --blush:   #fff0f8;
    --cream:   #fdf4ec;
    --muted:   rgba(255,240,248,0.55);
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--navy);
    font-family: 'Lora', Georgia, serif;
    color: var(--blush);
    -webkit-font-smoothing: antialiased;
  }

  /* ─── Canvas Background ─────────────────────────────────── */
  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
    pointer-events: none;
  }

  /* ─── Landing ──────────────────────────────────────────── */
  #landing {
    position: fixed;
    inset: 0;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(1.5rem, 4vh, 3rem);
    padding: 1.5rem;
    transition: opacity 0.5s ease;
  }

  /* ─── Title ─────────────────────────────────────────────── */
  #title {
    position: fixed;
    top: clamp(1.2rem, 3vh, 2.5rem);
    left: 50%;
    transform: translateX(-50%);
    z-index: 10;
    text-align: center;
    white-space: nowrap;
    pointer-events: none;
  }

  #title h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.6rem, 5.5vw, 3.8rem);
    font-weight: 900;
    font-style: italic;
    letter-spacing: 0.02em;
    background: linear-gradient(120deg, #ffd166 0%, #ff8dc7 40%, #e91e8c 70%, #ffd166 100%);
    background-size: 200% auto;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: shimmer 4s linear infinite, titlePulse 3s ease-in-out infinite;
    filter: drop-shadow(0 0 18px rgba(233, 30, 140, 0.55));
  }

  @keyframes shimmer {
    0%   { background-position: 0% center; }
    100% { background-position: 200% center; }
  }
  @keyframes titlePulse {
    0%, 100% { filter: drop-shadow(0 0 16px rgba(233,30,140,0.5)); }
    50%       { filter: drop-shadow(0 0 32px rgba(255,209,102,0.7)) drop-shadow(0 0 60px rgba(233,30,140,0.35)); }
  }

  /* ─── Card Wrapper (3D scene) ──────────────────────────── */
  #card-scene {
    perspective: 900px;
    margin-top: clamp(4rem, 10vh, 7rem);
  }

  #card {
    position: relative;
    width: clamp(260px, 80vw, 380px);
    aspect-ratio: 3/4;
    border-radius: 18px;
    cursor: pointer;
    transform-style: preserve-3d;
    animation: floatCard 5s ease-in-out infinite;
    transition: transform 0.2s ease, box-shadow 0.3s ease;
    will-change: transform;
    -webkit-tap-highlight-color: transparent;
  }

  @keyframes floatCard {
    0%   { transform: translateY(0px)   rotateX(6deg)  rotateY(-5deg); }
    25%  { transform: translateY(-14px) rotateX(3deg)  rotateY(5deg); }
    50%  { transform: translateY(-22px) rotateX(-4deg) rotateY(3deg); }
    75%  { transform: translateY(-10px) rotateX(5deg)  rotateY(-6deg); }
    100% { transform: translateY(0px)   rotateX(6deg)  rotateY(-5deg); }
  }

  #card:hover, #card:active {
    animation-play-state: paused;
    transform: translateY(-18px) rotateX(0deg) rotateY(0deg) scale(1.04) !important;
    box-shadow: 0 32px 80px rgba(233,30,140,0.45), 0 0 60px rgba(255,209,102,0.2);
  }

  /* Card face */
  .card-face {
    position: absolute;
    inset: 0;
    border-radius: 18px;
    padding: clamp(1.2rem, 4vw, 2rem);
    display: flex;
    flex-direction: column;
    gap: 1rem;
    overflow: hidden;
    /* Frosted envelope look */
    background:
      linear-gradient(135deg,
        rgba(255,240,248,0.13) 0%,
        rgba(233,30,140,0.07) 40%,
        rgba(18,8,58,0.55) 100%
      );
    backdrop-filter: blur(8px) saturate(1.4);
    -webkit-backdrop-filter: blur(8px) saturate(1.4);
    border: 1px solid rgba(255,209,102,0.22);
    box-shadow:
      0 20px 60px rgba(7,7,26,0.7),
      0 0 30px rgba(233,30,140,0.18),
      inset 0 1px 0 rgba(255,255,255,0.12);
  }

  /* Vignette / fade mask on card */
  .card-face::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 18px;
    background: linear-gradient(to bottom,
      transparent 0%,
      transparent 35%,
      rgba(7,7,26,0.55) 65%,
      rgba(7,7,26,0.88) 100%
    );
    pointer-events: none;
  }

  /* Overall card opacity — partially revealed */
  #card { opacity: 0.72; }
  #card:hover, #card:active { opacity: 1; }

  .card-seal {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #ffd166, #e91e8c 60%, #7a0840);
    box-shadow: 0 0 20px rgba(233,30,140,0.6), 0 0 40px rgba(255,209,102,0.25);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3rem;
    flex-shrink: 0;
    animation: sealGlow 3s ease-in-out infinite;
  }
  @keyframes sealGlow {
    0%, 100% { box-shadow: 0 0 18px rgba(233,30,140,0.55), 0 0 36px rgba(255,209,102,0.18); }
    50%       { box-shadow: 0 0 32px rgba(233,30,140,0.85), 0 0 64px rgba(255,209,102,0.4); }
  }

  .card-label {
    font-family: 'Playfair Display', serif;
    font-size: clamp(0.65rem, 2vw, 0.8rem);
    font-weight: 700;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.85;
  }

  .card-headline {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 3.5vw, 1.45rem);
    font-weight: 700;
    font-style: italic;
    line-height: 1.3;
    color: var(--blush);
  }

  .card-preview {
    font-size: clamp(0.78rem, 2.2vw, 0.92rem);
    line-height: 1.65;
    color: var(--muted);
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-cta {
    margin-top: auto;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: clamp(0.7rem, 2vw, 0.82rem);
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.8;
    position: relative;
    z-index: 1;
  }

  .card-cta svg {
    width: 16px; height: 16px;
    animation: arrowBounce 2s ease-in-out infinite;
  }
  @keyframes arrowBounce {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(3px); }
  }

  /* ─── Modal Overlay ─────────────────────────────────────── */
  #modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: clamp(0.75rem, 3vw, 2rem);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  #modal-overlay.open {
    pointer-events: all;
    opacity: 1;
  }

  /* Subtle dim behind modal */
  #modal-overlay::before {
    content: '';
    position: fixed;
    inset: 0;
    background: rgba(7, 7, 26, 0.6);
    backdrop-filter: blur(3px);
    -webkit-backdrop-filter: blur(3px);
    z-index: -1;
  }

  /* ─── Modal Card ────────────────────────────────────────── */
  #modal {
    position: relative;
    width: 100%;
    max-width: 680px;
    max-height: 90vh;
    border-radius: 22px;
    display: flex;
    flex-direction: column;
    background:
      linear-gradient(160deg,
        rgba(255,240,248,0.15) 0%,
        rgba(233,30,140,0.06) 50%,
        rgba(18,8,58,0.75) 100%
      );
    backdrop-filter: blur(24px) saturate(1.6);
    -webkit-backdrop-filter: blur(24px) saturate(1.6);
    border: 1px solid rgba(255,209,102,0.28);
    box-shadow:
      0 40px 100px rgba(7,7,26,0.8),
      0 0 60px rgba(233,30,140,0.25),
      0 0 120px rgba(233,30,140,0.12),
      inset 0 1px 0 rgba(255,255,255,0.14);
    transform: scale(0.82) rotateX(20deg);
    transform-origin: center center;
    transform-style: preserve-3d;
    perspective: 800px;
    transition: transform 0.55s cubic-bezier(0.34,1.56,0.64,1), opacity 0.4s ease;
    opacity: 0;
    animation: modalAmbient 6s ease-in-out infinite;
  }

  @keyframes modalAmbient {
    0%, 100% { box-shadow: 0 40px 100px rgba(7,7,26,0.8), 0 0 60px rgba(233,30,140,0.25), 0 0 120px rgba(233,30,140,0.12), inset 0 1px 0 rgba(255,255,255,0.14); }
    50%       { box-shadow: 0 40px 100px rgba(7,7,26,0.8), 0 0 80px rgba(233,30,140,0.38), 0 0 160px rgba(255,209,102,0.1), inset 0 1px 0 rgba(255,255,255,0.14); }
  }

  #modal-overlay.open #modal {
    transform: scale(1) rotateX(0deg);
    opacity: 1;
  }

  /* Modal Header */
  .modal-header {
    padding: clamp(1.2rem, 4vw, 2rem) clamp(1.2rem, 4vw, 2rem) 1rem;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 1rem;
    flex-shrink: 0;
    border-bottom: 1px solid rgba(255,209,102,0.12);
  }

  .modal-header-left {
    display: flex;
    align-items: center;
    gap: 0.85rem;
  }

  .modal-seal {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: radial-gradient(circle at 38% 35%, #ffd166, #e91e8c 60%, #7a0840);
    box-shadow: 0 0 20px rgba(233,30,140,0.55);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.15rem;
    flex-shrink: 0;
    animation: sealGlow 3s ease-in-out infinite;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3.5vw, 1.55rem);
    font-weight: 700;
    font-style: italic;
    color: var(--blush);
    line-height: 1.25;
  }

  .modal-subtitle {
    font-size: clamp(0.62rem, 1.8vw, 0.72rem);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0.75;
    margin-top: 0.15rem;
  }

  /* Close button */
  #close-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1px solid rgba(255,209,102,0.3);
    background: rgba(255,209,102,0.07);
    color: var(--gold);
    font-size: 1.1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
    line-height: 1;
  }
  #close-btn:hover {
    background: rgba(233,30,140,0.2);
    transform: rotate(90deg) scale(1.1);
    box-shadow: 0 0 16px rgba(233,30,140,0.4);
  }

  /* Scrollable body */
  .modal-body {
    overflow-y: auto;
    padding: clamp(1.2rem, 4vw, 2rem);
    flex: 1;
    scrollbar-width: thin;
    scrollbar-color: rgba(233,30,140,0.4) transparent;
  }
  .modal-body::-webkit-scrollbar { width: 4px; }
  .modal-body::-webkit-scrollbar-track { background: transparent; }
  .modal-body::-webkit-scrollbar-thumb { background: rgba(233,30,140,0.4); border-radius: 2px; }

  .modal-body p {
    font-size: clamp(0.88rem, 2.4vw, 1.05rem);
    line-height: 1.9;
    color: rgba(255,240,248,0.9);
    margin-bottom: 1.4em;
  }
  .modal-body p:last-child { margin-bottom: 0; }

  .modal-body .letter-opening {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 2.8vw, 1.2rem);
    font-style: italic;
    color: var(--gold);
    margin-bottom: 1.2em;
  }

  .modal-body .letter-closing {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1rem, 2.8vw, 1.15rem);
    font-style: italic;
    color: var(--rose);
    margin-top: 1.8em;
    margin-bottom: 0.3em;
  }

  .modal-body .letter-sig {
    font-family: 'Playfair Display', serif;
    font-size: clamp(1.1rem, 3vw, 1.4rem);
    font-weight: 700;
    color: var(--gold);
  }

  /* Divider */
  .modal-divider {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    color: rgba(255,209,102,0.35);
    font-size: 0.8rem;
    margin: 1.4em 0;
  }
  .modal-divider::before, .modal-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,209,102,0.18);
  }

  /* ─── Responsive tweaks ─────────────────────────────────── */
  @media (max-width: 480px) {
    #modal { border-radius: 16px; max-height: 93vh; }
    #card  { width: min(80vw, 300px); }
  }

  @media (prefers-reduced-motion: reduce) {
    #card { animation: none; }
    #title h1 { animation: none; }
    .card-seal { animation: none; }
    #modal { animation: none; }
  }
</style>
</head>

<script>
const BIRTHDAY_DATA = {
  /* Name shown on the title card */
  recipientName: "Gabrielle Keith Annogui Nabokiag",

  /* Short preview shown on the landing card (kept brief on purpose) */
  previewText: "There are letters that exist only because someone extraordinary came into the world…",

  /* Full letter — use \n\n for paragraph breaks */
  letter: `Dear Gab,

<!-- Canvas background -->
<canvas id="bg-canvas"></canvas>

<!-- Fixed title -->
<div id="title">
  <h1>Happy Birthday ❤️</h1>
</div>

<!-- Landing page -->
<div id="landing">
  <div id="card-scene">
    <div id="card" role="button" tabindex="0" aria-label="Open birthday letter" onclick="openModal()" onkeydown="if(event.key==='Enter'||event.key===' ')openModal()">
      <div class="card-face">
        <div class="card-seal">❤️</div>
        <div class="card-label">A special letter for</div>
        <div class="card-headline" id="card-recipient-name">—</div>
        <div class="card-preview" id="card-preview-text">—</div>
        <div class="card-cta">
          <span>Open letter</span>
          <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M8 3v10M3 8l5 5 5-5"/>
          </svg>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Modal -->
<div id="modal-overlay" aria-modal="true" role="dialog" aria-label="Birthday letter">
  <div id="modal">
    <div class="modal-header">
      <div class="modal-header-left">
        <div class="modal-seal">✉️</div>
        <div>
          <div class="modal-title" id="modal-recipient-name">—</div>
          <div class="modal-subtitle">A birthday letter</div>
        </div>
      </div>
      <button id="close-btn" onclick="closeModal()" aria-label="Close letter">✕</button>
    </div>
    <div class="modal-body" id="modal-body">
      <!-- filled by JS -->
    </div>
  </div>
</div>

<script>
/* ── Populate from data ── */
(function() {
  const d = BIRTHDAY_DATA;
  document.getElementById('card-recipient-name').textContent = d.recipientName;
  document.getElementById('card-preview-text').textContent   = d.previewText;
  document.getElementById('modal-recipient-name').textContent = d.recipientName;

  // Build letter HTML
  const paragraphs = d.letter.trim().split(/\n\n+/);
  let html = '';
  paragraphs.forEach((p, i) => {
    const text = p.replace(/\*(.+?)\*/g, '<em>$1</em>'); // support *italic*
    if (i === 0) {
      html += `<p class="letter-opening">${text}</p>`;
    } else {
      html += `<p>${text}</p>`;
    }
  });
  html += `<div class="modal-divider">✦</div>`;
  html += `<p class="letter-closing">${d.closingLine}</p>`;
  html += `<p class="letter-sig">${d.signatureName}</p>`;
  document.getElementById('modal-body').innerHTML = html;
})();

/* ── Modal open / close ── */
const overlay = document.getElementById('modal-overlay');
const landing = document.getElementById('landing');

function openModal() {
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
  // focus trap seed
  document.getElementById('close-btn').focus();
}

function closeModal() {
  overlay.classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('card').focus();
}

// Close on backdrop click
overlay.addEventListener('click', function(e) {
  if (e.target === overlay) closeModal();
});

// Close on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape' && overlay.classList.contains('open')) closeModal();
});

/* ── Canvas animation ── */
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');

  let W, H, dpr;
  const particles = [];
  const hearts    = [];
  const NUM_PARTICLES = 120;
  const NUM_HEARTS    = 18;

  function resize() {
    dpr    = window.devicePixelRatio || 1;
    W      = window.innerWidth;
    H      = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width  = W + 'px';
    canvas.style.height = H + 'px';
    ctx.scale(dpr, dpr);
  }

  // Star/particle
  function Particle() {
    this.reset = function() {
      this.x    = Math.random() * W;
      this.y    = Math.random() * H;
      this.r    = Math.random() * 1.6 + 0.3;
      this.vx   = (Math.random() - 0.5) * 0.18;
      this.vy   = (Math.random() - 0.5) * 0.18;
      this.life = Math.random();
      this.speed = Math.random() * 0.005 + 0.002;
      // color: rose, gold, or blush
      const c = Math.random();
      if (c < 0.3)      this.hue = 'rgba(233,30,140,';
      else if (c < 0.6) this.hue = 'rgba(255,209,102,';
      else              this.hue  = 'rgba(255,240,248,';
      this.alpha = Math.random() * 0.5 + 0.1;
      this.pulse = Math.random() * Math.PI * 2;
      this.pulseSpeed = Math.random() * 0.02 + 0.008;
    };
    this.reset();
    this.y = Math.random() * H; // spread initially
  }

  // Floating heart
  function Heart() {
    this.reset = function(fromBottom) {
      this.x     = Math.random() * W;
      this.y     = fromBottom ? H + 20 : Math.random() * H;
      this.size  = Math.random() * 14 + 6;
      this.vx    = (Math.random() - 0.5) * 0.4;
      this.vy    = -(Math.random() * 0.5 + 0.25);
      this.alpha = Math.random() * 0.35 + 0.06;
      this.rot   = (Math.random() - 0.5) * 0.6;
      this.rotV  = (Math.random() - 0.5) * 0.008;
      this.drift = Math.random() * Math.PI * 2;
      this.driftSpeed = Math.random() * 0.01 + 0.005;
    };
    this.reset(false);
  }

  function drawHeart(ctx, x, y, size, alpha, rot) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.moveTo(0, size * 0.3);
    ctx.bezierCurveTo(
      -size * 0.55, -size * 0.3,
      -size,         size * 0.15,
       0,            size
    );
    ctx.bezierCurveTo(
       size,         size * 0.15,
       size * 0.55, -size * 0.3,
       0,            size * 0.3
    );
    ctx.closePath();
    ctx.fillStyle = '#e91e8c';
    ctx.shadowColor = 'rgba(233,30,140,0.7)';
    ctx.shadowBlur  = size * 1.2;
    ctx.fill();
    ctx.restore();
  }

  // Nebula blobs (static gradient orbs)
  const nebulae = [
    { x: 0.15, y: 0.2,  r: 0.35, color: [233, 30, 140] },
    { x: 0.82, y: 0.75, r: 0.3,  color: [120, 40, 200] },
    { x: 0.55, y: 0.55, r: 0.25, color: [255, 100, 180] },
    { x: 0.9,  y: 0.1,  r: 0.2,  color: [255, 209, 102] },
  ];

  function drawNebulae(t) {
    nebulae.forEach((n, i) => {
      const pulse = 0.04 * Math.sin(t * 0.0006 + i);
      const cx = n.x * W;
      const cy = n.y * H;
      const radius = n.r * Math.min(W, H) * (1 + pulse);
      const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, radius);
      const [r,g,b] = n.color;
      grad.addColorStop(0,   `rgba(${r},${g},${b},0.07)`);
      grad.addColorStop(0.5, `rgba(${r},${g},${b},0.03)`);
      grad.addColorStop(1,   `rgba(${r},${g},${b},0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.ellipse(cx, cy, radius, radius * 0.7, t * 0.0002 + i, 0, Math.PI * 2);
      ctx.fill();
    });
  }

  // Init
  resize();
  for (let i = 0; i < NUM_PARTICLES; i++) { const p = new Particle(); particles.push(p); }
  for (let i = 0; i < NUM_HEARTS;    i++) { const h = new Heart();    hearts.push(h); }

  let frame = 0;
  function loop(t) {
    ctx.clearRect(0, 0, W, H);

    // Deep gradient sky
    const sky = ctx.createLinearGradient(0, 0, W * 0.3, H);
    sky.addColorStop(0, '#07071a');
    sky.addColorStop(0.5, '#0e0528');
    sky.addColorStop(1, '#07071a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Nebulae
    drawNebulae(t);

    // Particles
    particles.forEach(p => {
      p.life += p.speed;
      p.pulse += p.pulseSpeed;
      p.x += p.vx;
      p.y += p.vy;
      if (p.x < -5) p.x = W + 5;
      if (p.x > W + 5) p.x = -5;
      if (p.y < -5) p.y = H + 5;
      if (p.y > H + 5) p.y = -5;

      const alpha = p.alpha * (0.6 + 0.4 * Math.sin(p.pulse));
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fillStyle = p.hue + alpha + ')';
      ctx.shadowColor = p.hue + (alpha * 1.5) + ')';
      ctx.shadowBlur  = p.r * 4;
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    // Hearts
    hearts.forEach(h => {
      h.drift += h.driftSpeed;
      h.x  += h.vx + Math.sin(h.drift) * 0.3;
      h.y  += h.vy;
      h.rot += h.rotV;
      if (h.y < -40) h.reset(true);
      drawHeart(ctx, h.x, h.y, h.size, h.alpha, h.rot);
    });

    frame++;
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  window.addEventListener('resize', () => { resize(); });
})();
</script>
</body>
</html>
